<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>System Error — INFERA</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="/static/cssStyles/dashboard.css"
          th:href="@{/cssStyles/dashboard.css}">

    <link rel="shortcut icon"
          type="image/x-icon"
          href="/app_resources/logo.jpg"
          th:href="@{/app_resources/logo.jpg}">
</head>

<body>

<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<main class="error-page">

    <div class="error-card">

        <div class="error-icon">
            <i class="bi bi-exclamation-octagon-fill"></i>
        </div>

        <span class="error-status">
            SYSTEM ERROR
        </span>

        <h1>
            The Judgement Engine encountered an unexpected anomaly.
        </h1>

        <p>
            INFERA couldn't complete your request.
            The issue may be temporary, or the requested resource may no longer exist.
        </p>

        <div class="error-actions">

            <a th:href="@{/home}" class="btn-primary-custom">
                <i class="bi bi-house-door"></i>
                Return Home
            </a>

            <button class="btn-secondary-custom"
                    onclick="history.back()">

                <i class="bi bi-arrow-left"></i>
                Go Back

            </button>

        </div>

        <div class="error-footer">
            <small>
                If this problem persists, contact the system administrator.
            </small>
        </div>

    </div>

</main>

<script th:src="@{/javaScript/home.js}"
        src="/static/javaScript/home.js"></script>

</body>
</html>
